services:
  - type: static
    name: brightsky
    buildCommand: >
      npm install -g pnpm@9 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/brightsky run build
    staticPublishPath: ./dist/public
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.18.0
      - key: PNPM_VERSION
        value: "9"
      - key: BASE_PATH
        value: /
      - key: VITE_API_BASE_URL
        value: https://brightsky-api.onrender.com

  - type: web
    name: brightsky-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: >
      npm install -g pnpm@9 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    preDeployCommand: pnpm --filter @workspace/db run migrate
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.18.0
      - key: PNPM_VERSION
        value: "9"
      - key: DATABASE_URL
        fromDatabase:
          name: brightsky-db
          property: connectionString
      - key: PRE_FLIGHT_STRICT
        value: "true"
      - key: INTERNAL_BRIDGE_PORT
        value: "4001"
      - key: SUDO_CONFIRMATION_ENABLED
        value: "false"
      - key: EXECUTOR_CODE_HASH
        value: "0x6f2a4c10da345e0d48f2b1c93a9b1e7f3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f"
      - key: CHAIN_ID
        value: "8453"
      - key: PIMLICO_NETWORK
        value: base
      - key: MAX_PAIRS_TO_SCAN
        value: "2500"
      - key: SCAN_CONCURRENCY
        value: "8"
      - key: MEV_PROTECTION
        value: "true"
      - key: FLASH_LOAN_MAX
        value: "100000000"
      - key: PAPER_TRADING_MODE
        value: "false"
      - key: RPC_ENDPOINT
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: WALLET_ADDRESS
        sync: false
      - key: PIMLICO_API_KEY
        sync: false
      - key: PIMLICO_BUNDLER_URL
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false

databases:
  - name: brightsky-db
    databaseName: brightsky
    plan: starter
    region: oregon
