version: "3.8"
services:
  brightsky:
    build: .
    ports:
      - "4001:4001"
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - INTERNAL_BRIDGE_PORT=4001
      # Add other env vars as needed
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
